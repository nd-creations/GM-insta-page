<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GMinsta · Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0a;--surface:#1a1a1a;--surface2:#222;--surface3:#2e2e2e;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f5f5f5;--text2:#a8a8a8;--text3:#737373;
  --pink:#e1306c;--pink2:#f77737;
  --ig-grad:linear-gradient(45deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
  --story-grad:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  --nav:62px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* LAYOUT */
.dm-layout{display:flex;height:100dvh;max-width:960px;margin:0 auto}

/* LEFT PANEL */
.dm-left{width:340px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;height:100dvh}
@media(max-width:680px){
  .dm-left{width:100%}
  .dm-left.hidden{display:none}
  .dm-right{width:100%}
  .dm-right.hidden{display:none}
}

.dm-left-header{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:var(--nav);border-bottom:1px solid var(--border);flex-shrink:0}
.dm-back{background:none;border:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:6px;font-size:0.85rem;font-weight:500;padding:8px 10px;border-radius:10px;transition:background 0.15s,color 0.15s}
.dm-back:hover{background:var(--surface2);color:var(--text)}
.dm-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.dm-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.05rem}
.new-dm-btn{background:none;border:none;cursor:pointer;color:var(--text);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.new-dm-btn:hover{background:var(--surface2)}
.new-dm-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.dm-search{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.dm-search-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.85rem;padding:9px 14px;outline:none;transition:border-color 0.2s}
.dm-search-input:focus{border-color:rgba(225,48,108,0.4)}
.dm-search-input::placeholder{color:var(--text3)}

.dm-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
.dm-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background 0.15s}
.dm-item:hover{background:var(--surface)}
.dm-item.active{background:var(--surface)}
.dm-av{width:52px;height:52px;border-radius:50%;background:var(--surface2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:1px solid var(--border)}
.dm-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.dm-meta{flex:1;min-width:0}
.dm-name{font-size:0.88rem;font-weight:600;margin-bottom:2px}
.dm-preview{font-size:0.8rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-time{font-size:0.7rem;color:var(--text3);flex-shrink:0}
.dm-empty{padding:32px 16px;text-align:center;color:var(--text3);font-size:0.85rem;line-height:1.7}
.dm-empty-icon{font-size:2.5rem;display:block;margin-bottom:10px}

/* NEW CONVO PANEL */
.new-convo-panel{position:absolute;inset:0;background:var(--bg);z-index:10;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.34,1.1,0.64,1)}
.new-convo-panel.open{transform:translateX(0)}
.ncp-header{display:flex;align-items:center;gap:12px;padding:0 16px;height:var(--nav);border-bottom:1px solid var(--border);flex-shrink:0}
.ncp-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem}
.ncp-search{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.ncp-search input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;color:var(--text);font-size:0.85rem;padding:9px 14px;outline:none;transition:border-color 0.2s;font-family:'DM Sans',sans-serif}
.ncp-search input:focus{border-color:rgba(225,48,108,0.4)}
.ncp-search input::placeholder{color:var(--text3)}
.ncp-list{flex:1;overflow-y:auto}
.ncp-user{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;transition:background 0.15s}
.ncp-user:hover{background:var(--surface)}
.ncp-av{width:44px;height:44px;border-radius:50%;background:var(--surface2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.ncp-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ncp-name{font-size:0.88rem;font-weight:600}
.ncp-sub{font-size:0.75rem;color:var(--text3)}
.ncp-empty{padding:24px;text-align:center;color:var(--text3);font-size:0.83rem}

/* RIGHT PANEL */
.dm-right{flex:1;display:flex;flex-direction:column;height:100dvh;position:relative}

/* Empty state */
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);text-align:center;padding:24px}
.chat-empty .ce-icon{font-size:4rem;margin-bottom:18px;display:block}
.chat-empty h3{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:8px}
.chat-empty p{font-size:0.88rem;line-height:1.6;margin-bottom:20px}
.chat-empty-btn{background:var(--ig-grad);border:none;color:#fff;padding:11px 24px;border-radius:24px;font-size:0.88rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity 0.2s}
.chat-empty-btn:hover{opacity:0.88}

/* Chat header */
.chat-header{display:flex;align-items:center;gap:12px;padding:0 16px;height:var(--nav);border-bottom:1px solid var(--border);flex-shrink:0}
.chat-back-btn{background:none;border:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;transition:background 0.15s}
.chat-back-btn:hover{background:var(--surface2)}
.chat-back-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.chat-av{width:38px;height:38px;border-radius:50%;background:var(--surface2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem}
.chat-av img{width:100%;height:100%;object-fit:cover}
.chat-user-info{flex:1}
.chat-username{font-size:0.95rem;font-weight:700}
.chat-status{font-size:0.72rem;color:var(--text3)}

/* Messages area */
.messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
.msg-date-sep{text-align:center;font-size:0.72rem;color:var(--text3);margin:12px 0;letter-spacing:0.05em}
.msg-row{display:flex;align-items:flex-end;gap:7px}
.msg-row.mine{flex-direction:row-reverse}
.msg-av-sm{width:26px;height:26px;border-radius:50%;background:var(--surface2);font-size:0.75rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.msg-av-sm img{width:100%;height:100%;object-fit:cover}
.msg-bubble{max-width:68%;padding:9px 13px;border-radius:18px;font-size:0.88rem;line-height:1.45;word-break:break-word;position:relative}
.msg-row:not(.mine) .msg-bubble{background:var(--surface2);border-bottom-left-radius:4px;color:var(--text)}
.msg-row.mine .msg-bubble{background:var(--ig-grad);border-bottom-right-radius:4px;color:#fff}
.msg-time{font-size:0.65rem;color:var(--text3);flex-shrink:0;padding:0 2px;align-self:flex-end}
.msgs-empty{text-align:center;margin:auto;color:var(--text3);font-size:0.85rem;padding:24px}

/* Input */
.chat-input-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0}
.chat-input{flex:1;background:var(--surface2);border:1.5px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.88rem;padding:10px 16px;border-radius:22px;outline:none;transition:border-color 0.2s}
.chat-input:focus{border-color:rgba(225,48,108,0.4)}
.chat-input::placeholder{color:var(--text3)}
.send-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--ig-grad);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.15s,opacity 0.2s;opacity:0.35}
.send-btn.ready{opacity:1}
.send-btn:hover{transform:scale(1.08)}
.send-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;margin-left:2px}

/* Toasts */
.toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:600;display:flex;flex-direction:column-reverse;gap:8px;pointer-events:none;align-items:center}
.toast{background:rgba(30,30,42,0.95);border:1px solid var(--border2);border-radius:12px;padding:10px 16px;font-size:0.83rem;color:var(--text);white-space:nowrap;display:flex;align-items:center;gap:8px;backdrop-filter:blur(12px);animation:toastIn 0.35s cubic-bezier(0.34,1.2,0.64,1),toastOut 0.3s ease 2.7s forwards;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px) scale(0.95)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
</style>
</head>
<body>
<div class="dm-layout">

  <!-- LEFT PANEL -->
  <div class="dm-left" id="dmLeft">
    <div style="position:relative;flex:1;display:flex;flex-direction:column;overflow:hidden">

      <!-- Header -->
      <div class="dm-left-header">
        <button class="dm-back" onclick="window.location='/home'">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Home
        </button>
        <span class="dm-title">Messages</span>
        <button class="new-dm-btn" onclick="openNewConvo()" title="New message">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>

      <!-- Search conversations -->
      <div class="dm-search">
        <input class="dm-search-input" type="text" placeholder="Search conversations…" oninput="filterConvos(this.value)"/>
      </div>

      <!-- Conversation list -->
      <div class="dm-list" id="dmList">
        <div class="dm-empty"><span class="dm-empty-icon">💬</span>No conversations yet.<br/>Tap ✏️ to start a new chat!</div>
      </div>

      <!-- NEW CONVERSATION PANEL (slides in) -->
      <div class="new-convo-panel" id="newConvoPanel">
        <div class="ncp-header">
          <button class="dm-back" onclick="closeNewConvo()">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Back
          </button>
          <span class="ncp-title">New Message</span>
        </div>
        <div class="ncp-search">
          <input type="text" id="ncpSearch" placeholder="Search by username or name…" oninput="searchUsers(this.value)" autocomplete="off"/>
        </div>
        <div class="ncp-list" id="ncpList">
          <div class="ncp-empty">Type to search for someone to message</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="dm-right" id="dmRight">

    <!-- Empty state -->
    <div class="chat-empty" id="chatEmpty">
      <span class="ce-icon">💬</span>
      <h3>Your Messages</h3>
      <p>Send private messages to friends<br/>and stay connected.</p>
      <button class="chat-empty-btn" onclick="openNewConvo()">Send a message</button>
    </div>

    <!-- Active chat view -->
    <div id="chatView" style="display:none;flex-direction:column;height:100dvh">
      <div class="chat-header">
        <button class="chat-back-btn" onclick="closeChat()">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="chat-av" id="chatAv">👤</div>
        <div class="chat-user-info">
          <div class="chat-username" id="chatUsername"></div>
          <div class="chat-status">Active now</div>
        </div>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="chat-input-bar">
        <input class="chat-input" id="msgInput" type="text" placeholder="Message…"
          oninput="toggleSend(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"/>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
let myUser = null, convos = [], activeOtherId = null, allUsers = [], searchDebounce = null;

async function init() {
  try {
    myUser = await fetch('/auth/me').then(r => r.ok ? r.json() : null);
    if (!myUser) { window.location = '/login'; return; }
    await loadConvos();
    await loadAllUsers();

    // Open conversation from URL param: /chat?with=userId
    const params = new URLSearchParams(location.search);
    const withId = params.get('with');
    if (withId) {
      const user = allUsers.find(u => u._id === withId);
      if (user) openChat(withId, user.username, user.avatar);
    }
  } catch(e) { console.error(e); }
}

async function loadConvos() {
  try {
    const r = await fetch('/chat/conversations');
    convos = r.ok ? await r.json() : [];
    renderConvos(convos);
  } catch(e) {}
}

async function loadAllUsers() {
  try {
    const r = await fetch('/chat/users');
    allUsers = r.ok ? await r.json() : [];
  } catch(e) {}
}

function renderConvos(list) {
  const el = document.getElementById('dmList');
  if (!list.length) {
    el.innerHTML = `<div class="dm-empty"><span class="dm-empty-icon">💬</span>No conversations yet.<br/>Tap ✏️ to start a new chat!</div>`;
    return;
  }
  el.innerHTML = '';
  list.forEach(convo => {
    // FIX: find the "other" participant correctly
    const other = convo.participants?.find(p => {
      const pid = p?._id?.toString() || p?.toString();
      return pid !== myUser?._id?.toString();
    }) || { username: 'Unknown' };

    const av = other.avatar || '';
    const div = document.createElement('div');
    div.className = 'dm-item';
    div.dataset.uid = convo._id;
    div.onclick = () => openChat(convo._id, other.username, other.avatar);
    div.innerHTML = `
      <div class="dm-av">${av ? `<img src="${av}" onerror="this.parentElement.innerHTML='👤'"/>` : '👤'}</div>
      <div class="dm-meta">
        <div class="dm-name">${esc(other.username || 'Unknown')}</div>
        <div class="dm-preview">${esc(convo.lastMessage?.text || 'Say hi! 👋')}</div>
      </div>
      <span class="dm-time">${formatTime(convo.updatedAt)}</span>`;
    el.appendChild(div);
  });
}

async function openChat(otherId, username, avatar) {
  activeOtherId = otherId;

  // Highlight active convo
  document.querySelectorAll('.dm-item').forEach(i => i.classList.remove('active'));
  const activeItem = document.querySelector(`[data-uid="${otherId}"]`);
  if (activeItem) activeItem.classList.add('active');

  // On mobile: hide left, show right
  document.getElementById('dmLeft').classList.add('hidden');
  document.getElementById('dmRight').classList.remove('hidden');

  // Render header
  const avEl = document.getElementById('chatAv');
  avEl.innerHTML = avatar ? `<img src="${avatar}" onerror="this.parentElement.innerHTML='👤'"/>` : '👤';
  document.getElementById('chatUsername').textContent = username || 'Unknown';

  // Show chat view
  document.getElementById('chatEmpty').style.display = 'none';
  const cv = document.getElementById('chatView');
  cv.style.display = 'flex';

  await loadMessages(otherId);
  document.getElementById('msgInput').focus();
}

async function loadMessages(otherId) {
  const area = document.getElementById('messagesArea');
  area.innerHTML = '<div class="msgs-empty">Loading…</div>';
  try {
    // FIX: use /:otherId/messages route
    const r = await fetch(`/chat/${otherId}/messages`);
    const msgs = r.ok ? await r.json() : [];
    renderMessages(msgs);
  } catch(e) {
    area.innerHTML = '<div class="msgs-empty">Could not load messages.</div>';
  }
}

function renderMessages(msgs) {
  const area = document.getElementById('messagesArea');
  if (!msgs.length) {
    area.innerHTML = '<div class="msgs-empty">No messages yet. Say hello! 👋</div>';
    return;
  }
  area.innerHTML = '';
  let lastDate = null;
  msgs.forEach(m => {
    // FIX: handle both field naming conventions
    const senderId = m.sender?._id || m.sender || m.senderId?._id || m.senderId;
    const isMine = senderId?.toString() === myUser?._id?.toString();
    const text = m.text || m.messageText || '';
    const senderObj = m.sender || m.senderId || {};
    const av = isMine ? (myUser?.avatar || '') : (senderObj?.avatar || '');

    // Date separator
    const msgDate = new Date(m.createdAt).toDateString();
    if (msgDate !== lastDate) {
      const sep = document.createElement('div');
      sep.className = 'msg-date-sep';
      sep.textContent = new Date(m.createdAt).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      area.appendChild(sep);
      lastDate = msgDate;
    }

    const row = document.createElement('div');
    row.className = `msg-row${isMine ? ' mine' : ''}`;
    row.innerHTML = `
      ${!isMine ? `<div class="msg-av-sm">${av ? `<img src="${av}" onerror="this.parentElement.innerHTML='👤'"/>` : '👤'}</div>` : ''}
      <div class="msg-bubble">${esc(text)}</div>
      <span class="msg-time">${formatTime(m.createdAt)}</span>`;
    area.appendChild(row);
  });
  area.scrollTop = area.scrollHeight;
}

function toggleSend(input) {
  document.getElementById('sendBtn').classList.toggle('ready', input.value.trim().length > 0);
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activeOtherId) return;
  input.value = '';
  document.getElementById('sendBtn').classList.remove('ready');

  // Optimistic UI
  const area = document.getElementById('messagesArea');
  const emptyEl = area.querySelector('.msgs-empty');
  if (emptyEl) emptyEl.remove();
  const row = document.createElement('div');
  row.className = 'msg-row mine';
  row.innerHTML = `<div class="msg-bubble">${esc(text)}</div><span class="msg-time">now</span>`;
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;

  try {
    // FIX: use correct route and field name
    await fetch(`/chat/${activeOtherId}/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    // Update convo preview
    updateConvoPreview(activeOtherId, text);
  } catch(e) { toast('❌ Failed to send'); }
}

function updateConvoPreview(uid, text) {
  const item = document.querySelector(`[data-uid="${uid}"] .dm-preview`);
  if (item) item.textContent = text;
  const timeEl = document.querySelector(`[data-uid="${uid}"] .dm-time`);
  if (timeEl) timeEl.textContent = 'now';
}

function closeChat() {
  document.getElementById('chatView').style.display = 'none';
  document.getElementById('chatEmpty').style.display = 'flex';
  activeOtherId = null;
  document.querySelectorAll('.dm-item').forEach(i => i.classList.remove('active'));
  // On mobile: show left panel
  document.getElementById('dmLeft').classList.remove('hidden');
  document.getElementById('dmRight').classList.add('hidden');
}

// ── NEW CONVERSATION PANEL ──
function openNewConvo() {
  document.getElementById('newConvoPanel').classList.add('open');
  document.getElementById('ncpSearch').focus();
  renderNcpUsers(allUsers);
}
function closeNewConvo() {
  document.getElementById('newConvoPanel').classList.remove('open');
  document.getElementById('ncpSearch').value = '';
}

function renderNcpUsers(users) {
  const list = document.getElementById('ncpList');
  if (!users.length) {
    list.innerHTML = '<div class="ncp-empty">No users found.</div>';
    return;
  }
  list.innerHTML = users.map(u => `
    <div class="ncp-user" onclick="startConvoWith('${u._id}','${esc(u.username)}','${esc(u.avatar||'')}')">
      <div class="ncp-av">${u.avatar ? `<img src="${u.avatar}" onerror="this.parentElement.innerHTML='👤'"/>` : '👤'}</div>
      <div>
        <div class="ncp-name">${esc(u.username)}</div>
        ${u.fullname ? `<div class="ncp-sub">${esc(u.fullname)}</div>` : ''}
      </div>
    </div>`).join('');
}

async function searchUsers(q) {
  clearTimeout(searchDebounce);
  if (!q.trim()) { renderNcpUsers(allUsers); return; }
  searchDebounce = setTimeout(async () => {
    try {
      const r = await fetch(`/chat/search?q=${encodeURIComponent(q)}`);
      const users = r.ok ? await r.json() : [];
      renderNcpUsers(users);
    } catch(e) {
      renderNcpUsers(allUsers.filter(u =>
        u.username?.toLowerCase().includes(q.toLowerCase()) ||
        u.fullname?.toLowerCase().includes(q.toLowerCase())
      ));
    }
  }, 300);
}

function startConvoWith(uid, username, avatar) {
  closeNewConvo();
  // Check if convo already exists
  const existing = document.querySelector(`[data-uid="${uid}"]`);
  if (existing) { existing.click(); return; }
  // Create a temporary convo item
  const el = document.getElementById('dmList');
  const emptyMsg = el.querySelector('.dm-empty');
  if (emptyMsg) emptyMsg.remove();
  const div = document.createElement('div');
  div.className = 'dm-item';
  div.dataset.uid = uid;
  div.onclick = () => openChat(uid, username, avatar);
  div.innerHTML = `
    <div class="dm-av">${avatar ? `<img src="${avatar}" onerror="this.parentElement.innerHTML='👤'"/>` : '👤'}</div>
    <div class="dm-meta">
      <div class="dm-name">${esc(username)}</div>
      <div class="dm-preview">Say hi! 👋</div>
    </div>
    <span class="dm-time">now</span>`;
  el.prepend(div);
  openChat(uid, username, avatar);
}

function filterConvos(q) {
  document.querySelectorAll('.dm-item').forEach(item => {
    const name = item.querySelector('.dm-name')?.textContent?.toLowerCase() || '';
    item.style.display = name.includes(q.toLowerCase()) ? 'flex' : 'none';
  });
}

// ── HELPERS ──
function formatTime(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  if (s < 604800) return Math.floor(s/86400) + 'd';
  return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function esc(t) {
  if (!t) return '';
  const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
}
function toast(msg) {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
  wrap.appendChild(el); setTimeout(()=>el.remove(),3200);
}

// Mobile: on larger screens show both panels
function handleResize() {
  if (window.innerWidth > 680) {
    document.getElementById('dmLeft').classList.remove('hidden');
    document.getElementById('dmRight').classList.remove('hidden');
  }
}
window.addEventListener('resize', handleResize);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeNewConvo();
});

init();
</script>
</body>
