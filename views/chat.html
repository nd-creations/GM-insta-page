<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GMinsta · Messages</title>
<link href="https://fonts.googleapis.com/css2?family=Billabong&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;--card:#111;--border:#262626;--text:#fff;--muted:#a8a8a8;
  --accent:#e1306c;--grad:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  --nav-h:60px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden}

/* ── LAYOUT ── */
.dm-layout{display:flex;height:100vh;max-width:935px;margin:0 auto}

/* ── LEFT PANEL (conversations list) ── */
.dm-left{
  width:340px;flex-shrink:0;border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100vh;
}
@media(max-width:700px){
  .dm-left{width:100%;display:none}
  .dm-left.mobile-visible{display:flex}
  .dm-right{width:100%}
}

.dm-left-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border);height:var(--nav-h);
}
.dm-logo{font-family:'Billabong',cursive;font-size:26px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.new-dm-btn{background:none;border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
.new-dm-btn svg{width:24px;height:24px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.dm-search{padding:12px 16px;border-bottom:1px solid var(--border)}
.dm-search input{
  width:100%;background:#262626;border:none;border-radius:10px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  padding:10px 16px;outline:none;
}
.dm-search input::placeholder{color:var(--muted)}

.dm-list{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 transparent}
.dm-item{
  display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;
  transition:background .15s;border-radius:0;
}
.dm-item:hover{background:#1a1a1a}
.dm-item.active{background:#1a1a1a}
.dm-avatar{width:54px;height:54px;border-radius:50%;object-fit:cover;background:#222;flex-shrink:0;font-size:24px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border)}
.dm-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.dm-meta{flex:1;min-width:0}
.dm-name{font-size:14px;font-weight:600;margin-bottom:2px}
.dm-preview{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dm-time{font-size:11px;color:var(--muted);flex-shrink:0}
.unread-dot{width:8px;height:8px;background:#0095f6;border-radius:50%;flex-shrink:0}

/* ── RIGHT PANEL (messages) ── */
.dm-right{flex:1;display:flex;flex-direction:column;height:100vh}

.chat-header{
  display:flex;align-items:center;gap:14px;padding:0 20px;
  height:var(--nav-h);border-bottom:1px solid var(--border);flex-shrink:0;
}
.chat-back{background:none;border:none;color:var(--text);cursor:pointer;display:flex;margin-right:4px}
.chat-back svg{width:22px;height:22px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.chat-avatar{width:40px;height:40px;border-radius:50%;background:#222;font-size:20px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.chat-avatar img{width:100%;height:100%;object-fit:cover}
.chat-user-info{flex:1}
.chat-username{font-size:15px;font-weight:700}
.chat-status{font-size:12px;color:var(--muted)}
.chat-header-actions{display:flex;gap:12px}
.chat-header-actions button{background:none;border:none;cursor:pointer}
.chat-header-actions svg{width:24px;height:24px;stroke:var(--text);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin;scrollbar-color:#333 transparent}

/* empty state */
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted)}
.chat-empty .ce-icon{font-size:64px;margin-bottom:16px}
.chat-empty h3{font-size:22px;font-weight:300;color:var(--text);margin-bottom:8px}
.chat-empty p{font-size:14px}

/* message bubbles */
.msg-group{display:flex;flex-direction:column;gap:2px}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.mine{flex-direction:row-reverse}
.msg-avatar-sm{width:28px;height:28px;border-radius:50%;background:#222;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.msg-avatar-sm img{width:100%;height:100%;object-fit:cover}
.msg-bubble{
  max-width:65%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.45;
  word-break:break-word;position:relative;
}
.msg-row:not(.mine) .msg-bubble{background:#262626;border-bottom-left-radius:4px}
.msg-row.mine .msg-bubble{background:linear-gradient(135deg,#833ab4,#e1306c);border-bottom-right-radius:4px;color:#fff}
.msg-time{font-size:10px;color:var(--muted);padding:0 4px;align-self:flex-end;flex-shrink:0}

.msg-date-divider{text-align:center;font-size:12px;color:var(--muted);margin:12px 0}

/* ── INPUT ── */
.chat-input-bar{
  display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-top:1px solid var(--border);flex-shrink:0;
}
.chat-input-bar input{
  flex:1;background:#1a1a1a;border:1px solid var(--border);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  padding:11px 16px;border-radius:22px;outline:none;transition:border-color .2s;
}
.chat-input-bar input:focus{border-color:#555}
.chat-input-bar input::placeholder{color:var(--muted)}
.send-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:var(--grad);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .15s,opacity .2s;opacity:.5;
}
.send-btn.active{opacity:1}
.send-btn:hover{transform:scale(1.08)}
.send-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;margin-left:2px}
.emoji-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;transition:transform .15s}
.emoji-btn:hover{transform:scale(1.15)}
</style>
</head>
<body>
<div class="dm-layout">
  <!-- LEFT: conversation list -->
  <div class="dm-left" id="dmLeft">
    <div class="dm-left-header">
      <span class="dm-logo">GMinsta</span>
      <button class="new-dm-btn">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
    <div class="dm-search">
      <input type="text" placeholder="Search" oninput="filterConvos(this.value)"/>
    </div>
    <div class="dm-list" id="dmList">
      <!-- injected -->
    </div>
  </div>

  <!-- RIGHT: active chat -->
  <div class="dm-right" id="dmRight">
    <!-- Initial empty state -->
    <div class="chat-empty" id="chatEmpty">
      <div class="ce-icon">💬</div>
      <h3>Your Messages</h3>
      <p>Send a message to start a chat.</p>
    </div>
    <!-- Chat view (hidden until convo selected) -->
    <div id="chatView" style="display:none;flex-direction:column;height:100%">
      <div class="chat-header">
        <button class="chat-back" onclick="closeChat()"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
        <div class="chat-avatar" id="chatAvatar"><img id="chatAvatarImg"/></div>
        <div class="chat-user-info">
          <div class="chat-username" id="chatUsername"></div>
          <div class="chat-status" id="chatStatus">Active now</div>
        </div>
        <div class="chat-header-actions">
          <button><svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></button>
          <button><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>
        </div>
      </div>
      <div class="messages-area" id="messagesArea"></div>
      <div class="chat-input-bar">
        <button class="emoji-btn">😊</button>
        <input type="text" id="msgInput" placeholder="Message…" oninput="toggleSend(this)" onkeydown="sendMsg(event)"/>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
let activeConvo=null;let myUser=null;let convos=[];

async function init(){
  myUser=await fetch('/auth/me').then(r=>r.ok?r.json():null);
  convos=await fetch('/chat/conversations').then(r=>r.ok?r.json():[]).catch(()=>[]);
  renderConvos(convos);
}

function renderConvos(list){
  const c=document.getElementById('dmList');
  if(!list.length){c.innerHTML='<div style="padding:24px 16px;color:var(--muted);font-size:14px">No conversations yet.</div>';return}
  c.innerHTML='';
  list.forEach(convo=>{
    const other=convo.participants?.find(p=>p._id!==myUser?._id)||{username:'Unknown'};
    const av=other.avatar||'/uploads/default-avatar.png';
    const el=document.createElement('div');
    el.className='dm-item';
    el.dataset.id=convo._id;
    el.onclick=()=>openConvo(convo,other,av);
    el.innerHTML=`<div class="dm-avatar"><img src="${av}" onerror="this.parentNode.innerHTML='👤'"/></div>
      <div class="dm-meta">
        <div class="dm-name">${other.username}</div>
        <div class="dm-preview">${convo.lastMessage?.text||'Say hi!'}</div>
      </div>
      <span class="dm-time">${formatTime(convo.updatedAt)}</span>`;
    c.appendChild(el);
  });
}

async function openConvo(convo,other,av){
  activeConvo=convo;
  document.querySelectorAll('.dm-item').forEach(i=>i.classList.remove('active'));
  document.querySelector(`[data-id="${convo._id}"]`)?.classList.add('active');
  document.getElementById('chatAvatarImg').src=av;
  document.getElementById('chatUsername').textContent=other.username;
  document.getElementById('chatEmpty').style.display='none';
  const cv=document.getElementById('chatView');cv.style.display='flex';

  const msgs=await fetch(`/chat/${convo._id}/messages`).then(r=>r.ok?r.json():[]).catch(()=>[]);
  renderMessages(msgs,other);
}

function renderMessages(msgs,other){
  const area=document.getElementById('messagesArea');
  area.innerHTML='';
  if(!msgs.length){
    area.innerHTML=`<div style="text-align:center;margin:auto;color:var(--muted);font-size:14px">Start the conversation!</div>`;
    return;
  }
  msgs.forEach(m=>{
    const mine=m.sender?._id===myUser?._id||m.sender===myUser?._id;
    const row=document.createElement('div');
    row.className=`msg-row ${mine?'mine':''}`;
    const av=mine?(myUser?.avatar||'/uploads/default-avatar.png'):(other?.avatar||'/uploads/default-avatar.png');
    row.innerHTML=`
      ${!mine?`<div class="msg-avatar-sm"><img src="${av}" onerror="this.parentNode.innerHTML='👤'"/></div>`:''}
      <div class="msg-bubble">${escapeHtml(m.text)}</div>
      <span class="msg-time">${formatTime(m.createdAt)}</span>`;
    area.appendChild(row);
  });
  area.scrollTop=area.scrollHeight;
}

function toggleSend(input){
  document.getElementById('sendBtn').classList.toggle('active',input.value.trim().length>0);
}
function sendMsg(e){if(e.key==='Enter')sendMessage()}

async function sendMessage(){
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text||!activeConvo)return;
  input.value='';document.getElementById('sendBtn').classList.remove('active');

  const area=document.getElementById('messagesArea');
  const row=document.createElement('div');
  row.className='msg-row mine';
  row.innerHTML=`<div class="msg-bubble">${escapeHtml(text)}</div><span class="msg-time">now</span>`;
  area.appendChild(row);
  area.scrollTop=area.scrollHeight;

  try{
    await fetch(`/chat/${activeConvo._id}/messages`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
  }catch(e){}
}

function closeChat(){
  document.getElementById('chatView').style.display='none';
  document.getElementById('chatEmpty').style.display='flex';
  activeConvo=null;
  document.querySelectorAll('.dm-item').forEach(i=>i.classList.remove('active'));
}

function filterConvos(q){
  const items=document.querySelectorAll('.dm-item');
  items.forEach(i=>{
    const name=i.querySelector('.dm-name').textContent.toLowerCase();
    i.style.display=name.includes(q.toLowerCase())?'flex':'none';
  });
}

function formatTime(ts){
  if(!ts)return '';
  const d=new Date(ts),now=new Date();
  const s=Math.floor((now-d)/1000);
  if(s<60)return 'now';if(s<3600)return `${Math.floor(s/60)}m`;
  if(s<86400)return `${Math.floor(s/3600)}h`;return `${Math.floor(s/86400)}d`;
}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

init();
</script>
</body>
</html>
