<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>GMinsta</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --surface: #1a1a1a;
  --surface2: #222222;
  --surface3: #2e2e2e;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f5f5f5;
  --text2: #a8a8a8;
  --text3: #737373;
  --pink: #e1306c;
  --pink2: #f77737;
  --pink3: #c13584;
  --pink-glow: 0 0 20px rgba(225,48,108,0.35);
  --ig-grad: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
  --red: #ed4956;
  --blue: #0095f6;
  --green: #3ddc97;
  --story-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
  --card-glow: 0 0 0 1px rgba(255,255,255,0.04), 0 8px 32px rgba(0,0,0,0.6);
  --r: 18px;
  --r2: 14px;
  --topbar: 62px;
  --bottomnav: 72px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content:'';
  position:fixed; inset:0; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; opacity: 0.4;
}

/* ── TOPBAR ── */
.topbar {
  position: fixed; top:0; left:0; right:0; z-index:200;
  height: var(--topbar);
  display: flex; align-items:center; justify-content:space-between;
  padding: 0 16px;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border);
}
.topbar::after {
  content:'';
  position:absolute; bottom:-1px; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, rgba(225,48,108,0.5), transparent);
}

.logo-wrap { display:flex; align-items:center; gap:10px; cursor:pointer; }
.logo-icon {
  width:36px; height:36px; border-radius:10px;
  background: var(--ig-grad);
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:1rem; color:#fff;
  box-shadow: var(--pink-glow);
  position:relative; overflow:hidden; flex-shrink:0;
  animation: logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { box-shadow: 0 0 12px rgba(225,48,108,0.35); }
  50% { box-shadow: 0 0 28px rgba(225,48,108,0.75); }
}
.logo-icon::after {
  content:''; position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
}
.logo-gm {
  font-family: 'Syne', sans-serif;
  font-size:1.35rem; font-weight:800; letter-spacing:-0.02em;
  background: linear-gradient(90deg, #f77737, #e1306c, #c13584);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-icon svg { width:18px; height:18px; stroke:#fff; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; position:relative; z-index:1; }

.topbar-right { display:flex; align-items:center; gap:4px; }
.icon-btn {
  width:40px; height:40px; border-radius:50%;
  background:none; border:none; cursor:pointer;
  color:var(--text); font-size:1.25rem;
  display:flex; align-items:center; justify-content:center;
  position:relative; transition: background 0.2s, transform 0.15s;
}
.icon-btn:hover { background: var(--surface2); }
.icon-btn:active { transform: scale(0.9); }
.badge {
  position:absolute; top:5px; right:5px;
  width:17px; height:17px; border-radius:50%;
  background: var(--red); color:#fff;
  font-size:0.6rem; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  border:2px solid var(--bg);
  transform: scale(0);
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.badge.show { transform: scale(1); }

/* ── PROFILE DROPDOWN ── */
.profile-dropdown-wrap { position: relative; }
.profile-dropdown {
  position: absolute; top: calc(100% + 10px); right: 0;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  min-width: 220px;
  overflow: hidden;
  opacity: 0; pointer-events: none; transform: translateY(-8px) scale(0.97);
  transition: opacity 0.2s, transform 0.2s cubic-bezier(0.34,1.2,0.64,1);
  z-index: 300;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7);
}
.profile-dropdown.open { opacity:1; pointer-events:all; transform: translateY(0) scale(1); }
.pd-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items:center; gap:10px;
}
.pd-av {
  width:38px; height:38px; border-radius:50%;
  background: var(--ig-grad); padding:2px; flex-shrink:0;
}
.pd-av-inner {
  width:100%; height:100%; border-radius:50%;
  background: var(--surface2); border:2px solid var(--bg);
  overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:1rem;
}
.pd-av-inner img { width:100%; height:100%; object-fit:cover; }
.pd-name { font-weight:600; font-size:0.9rem; }
.pd-handle { font-size:0.75rem; color:var(--text3); }
.pd-stats { display:flex; padding:10px 0; border-bottom:1px solid var(--border); }
.pd-stat { flex:1; text-align:center; padding:6px 0; }
.pd-stat-num { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; display:block; }
.pd-stat-label { font-size:0.68rem; color:var(--text3); }
.pd-item {
  display:flex; align-items:center; gap:12px;
  padding:13px 16px; cursor:pointer; font-size:0.88rem;
  transition: background 0.15s;
}
.pd-item:hover { background: var(--surface2); }
.pd-item.danger { color: var(--red); }
.pd-item-icon { font-size:1.1rem; width:24px; text-align:center; }

/* ── NOTIFICATIONS PANEL ── */
.notif-panel {
  position: fixed; top: var(--topbar); right: 0; z-index:300;
  width: min(380px, 100vw);
  height: calc(100dvh - var(--topbar));
  background: var(--bg2);
  border-left: 1px solid var(--border2);
  display: flex; flex-direction:column;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.34,1.05,0.64,1);
}
.notif-panel.open { transform: translateX(0); }
.notif-header {
  padding:18px 18px 14px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
}
.notif-title { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; }
.notif-close {
  background:var(--surface2); border:none; cursor:pointer;
  color:var(--text2); width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:1rem;
  transition:background 0.2s;
}
.notif-close:hover { background:var(--surface3); color:var(--text); }
.notif-tabs {
  display:flex; gap:2px; padding:10px 14px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.notif-tab {
  flex:1; background:none; border:none; cursor:pointer;
  color:var(--text3); font-size:0.78rem; font-weight:600;
  padding:7px 10px; border-radius:8px;
  transition:all 0.2s; font-family:'DM Sans',sans-serif;
}
.notif-tab.active { background:var(--surface); color:var(--text); }
.notif-list { overflow-y:auto; flex:1; }
.notif-item {
  display:flex; align-items:flex-start; gap:12px;
  padding:14px 16px; cursor:pointer;
  border-bottom:1px solid var(--border);
  transition:background 0.15s;
  animation: notifSlide 0.4s ease both;
}
@keyframes notifSlide { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.notif-item:hover { background:var(--surface); }
.notif-item.unread { background: rgba(225,48,108,0.04); }
.notif-av {
  width:42px; height:42px; border-radius:50%;
  background:var(--surface3); overflow:hidden; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:1.1rem;
}
.notif-av img { width:100%; height:100%; object-fit:cover; }
.notif-content { flex:1; }
.notif-text { font-size:0.84rem; line-height:1.5; }
.notif-text strong { font-weight:700; color:var(--text); }
.notif-time { font-size:0.72rem; color:var(--text3); margin-top:3px; }
.notif-thumb {
  width:42px; height:42px; border-radius:8px;
  background:var(--surface3); overflow:hidden; flex-shrink:0;
}
.notif-thumb img { width:100%; height:100%; object-fit:cover; }
.notif-dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--pink); flex-shrink:0; margin-top:6px;
}
.notif-action-btn {
  background:none; border:1.5px solid var(--border2);
  color:var(--text); font-size:0.76rem; font-weight:600;
  padding:5px 12px; border-radius:7px; cursor:pointer;
  font-family:'DM Sans',sans-serif; transition:all 0.2s; margin-top:6px;
}
.notif-action-btn:hover { background:var(--surface2); }
.notif-action-btn.follow-back {
  background: var(--ig-grad); border:none; color:#fff;
}
.notif-empty { text-align:center; padding:60px 24px; color:var(--text3); }
.notif-empty-icon { font-size:3rem; margin-bottom:12px; }

/* ── OVERLAY BACKDROP ── */
.panel-backdrop {
  position:fixed; inset:0; z-index:250;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
  opacity:0; pointer-events:none; transition:opacity 0.25s;
}
.panel-backdrop.open { opacity:1; pointer-events:all; }

/* ── LAYOUT ── */
.layout {
  max-width: 960px; margin:0 auto;
  padding-top: var(--topbar);
  padding-bottom: var(--bottomnav);
  display: grid; grid-template-columns: 1fr;
}
@media(min-width:768px) {
  .layout { grid-template-columns: 1fr 320px; gap:24px; padding: calc(var(--topbar) + 20px) 20px 20px; }
}

/* ── STORIES ── */
.stories-container { padding: 12px 0 0; }
.stories-header {
  padding: 0 16px 10px;
  font-size:0.72rem; font-weight:600; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--text3);
}
.stories-scroll {
  display:flex; gap:12px;
  padding:4px 16px 16px;
  overflow-x:auto; scrollbar-width:none;
  scroll-snap-type: x mandatory;
}
.stories-scroll::-webkit-scrollbar { display:none; }
.story-item {
  display:flex; flex-direction:column; align-items:center;
  gap:6px; cursor:pointer; flex-shrink:0;
  scroll-snap-align: start;
  opacity:0; transform: translateY(10px);
  animation: storyFadeIn 0.4s ease forwards;
}
@keyframes storyFadeIn { to { opacity:1; transform:translateY(0); }}
.story-item:nth-child(1){animation-delay:0.05s}
.story-item:nth-child(2){animation-delay:0.1s}
.story-item:nth-child(3){animation-delay:0.15s}
.story-item:nth-child(4){animation-delay:0.2s}
.story-item:nth-child(5){animation-delay:0.25s}
.story-item:nth-child(6){animation-delay:0.3s}
.story-ring-wrap { position:relative; width:70px; height:70px; }
.story-ring {
  width:70px; height:70px; border-radius:50%;
  padding:2.5px; background: var(--story-grad);
  transition: transform 0.2s;
}
.story-ring:hover { transform: scale(1.07); }
.story-ring.seen { background:var(--surface3); }
.story-ring.add { background: var(--surface3); border:2px dashed var(--pink); padding:0; }
.story-inner {
  width:100%; height:100%; border-radius:50%;
  background: var(--surface2); overflow:hidden;
  border: 2.5px solid var(--bg);
  display:flex; align-items:center; justify-content:center; font-size:1.4rem;
}
.story-inner img { width:100%; height:100%; object-fit:cover; }
.story-add-plus {
  position:absolute; bottom:1px; right:1px;
  width:22px; height:22px; border-radius:50%;
  background: var(--ig-grad); border:2.5px solid var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:0.75rem; color:#000; font-weight:700;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
.story-name { font-size:0.68rem; color:var(--text2); max-width:68px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* Story Viewer */
.story-viewer {
  position:fixed; inset:0; z-index:500;
  background:#000; display:flex; flex-direction:column;
  opacity:0; pointer-events:none; transition: opacity 0.25s;
}
.story-viewer.open { opacity:1; pointer-events:all; }
.story-progress-bars { display:flex; gap:3px; padding: 14px 12px 8px; position:absolute; top:0; left:0; right:0; z-index:10; }
.story-prog-bar { flex:1; height:2.5px; background:rgba(255,255,255,0.3); border-radius:2px; overflow:hidden; }
.story-prog-fill { height:100%; background:#fff; width:0%; transition: width 0.05s linear; }
.story-prog-fill.done { width:100%; }
.story-viewer-content { flex:1; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
.story-viewer-img { width:100%; height:100%; object-fit:cover; }
.story-viewer-header { position:absolute; top:44px; left:0; right:0; display:flex; align-items:center; gap:10px; padding:12px 16px; z-index:10; }
.story-viewer-avatar { width:36px; height:36px; border-radius:50%; overflow:hidden; border:2px solid #fff; }
.story-viewer-name { font-weight:600; color:#fff; font-size:0.9rem; text-shadow:0 1px 4px rgba(0,0,0,0.5); }
.story-viewer-time { font-size:0.72rem; color:rgba(255,255,255,0.7); }
.story-viewer-close { margin-left:auto; background:none; border:none; cursor:pointer; color:#fff; font-size:1.4rem; padding:6px; }
.story-tap-left, .story-tap-right { position:absolute; top:0; bottom:0; width:40%; z-index:5; cursor:pointer; }
.story-tap-left { left:0; }
.story-tap-right { right:0; }

/* ── FEED DIVIDER ── */
.feed-divider {
  display:flex; align-items:center; gap:12px;
  padding:0 16px 12px;
  color:var(--text3); font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; font-weight:600;
}
.feed-divider::before, .feed-divider::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── POST CARD ── */
.posts-feed { display:flex; flex-direction:column; }
.post-card {
  background: var(--surface); border: 1px solid var(--border);
  margin: 0 0 2px; overflow:hidden;
  opacity:0; transform: translateY(20px);
  animation: cardReveal 0.5s ease forwards;
  transition: border-color 0.3s;
}
@media(min-width:768px) { .post-card { border-radius: var(--r); margin: 0 0 16px; } }
.post-card:hover { border-color: rgba(225,48,108,0.2); }
.post-card:nth-child(1){animation-delay:0.1s}
.post-card:nth-child(2){animation-delay:0.2s}
.post-card:nth-child(3){animation-delay:0.3s}
.post-card:nth-child(4){animation-delay:0.4s}
@keyframes cardReveal { to { opacity:1; transform:translateY(0); }}

.post-header { display:flex; align-items:center; padding:12px 14px; }
.post-avatar-wrap { width:42px; height:42px; border-radius:50%; background: var(--story-grad); padding:2px; flex-shrink:0; cursor:pointer; }
.post-avatar-inner { width:100%; height:100%; border-radius:50%; background:var(--surface2); overflow:hidden; border:2px solid var(--bg); display:flex; align-items:center; justify-content:center; font-size:1rem; }
.post-avatar-inner img { width:100%; height:100%; object-fit:cover; }
.post-meta { flex:1; padding:0 10px; }
.post-username { font-weight:600; font-size:0.9rem; cursor:pointer; }
.post-username:hover { color:var(--pink2); }
.post-location { font-size:0.71rem; color:var(--text3); display:flex; align-items:center; gap:3px; margin-top:1px; }
.post-menu { background:none; border:none; cursor:pointer; color:var(--text2); font-size:1.1rem; padding:6px; border-radius:8px; transition:background 0.2s; }
.post-menu:hover { background:var(--surface2); }

/* ── MEDIA ── */
.post-media { width:100%; aspect-ratio:1; background:var(--surface2); position:relative; overflow:hidden; cursor:pointer; }
.post-media img, .post-media video { width:100%; height:100%; object-fit:cover; display:block; transition: transform 0.6s cubic-bezier(0.25,0.8,0.25,1); }
.post-media:hover img, .post-media:hover video { transform:scale(1.03); }
.dt-heart { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0); font-size:5.5rem; pointer-events:none; filter: drop-shadow(0 0 20px rgba(255,59,92,0.8)); opacity:0; }
.dt-heart.burst { animation: dtBurst 0.9s cubic-bezier(0.34,1.2,0.64,1) forwards; }
@keyframes dtBurst {
  0%  { opacity:0; transform:translate(-50%,-50%) scale(0) rotate(-15deg); }
  25% { opacity:1; transform:translate(-50%,-50%) scale(1.3) rotate(5deg); }
  60% { opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0deg); }
  100%{ opacity:0; transform:translate(-50%,-50%) scale(0.7); }
}

/* ── ACTIONS ── */
.post-actions { display:flex; align-items:center; justify-content:space-between; padding:10px 12px 6px; }
.actions-left { display:flex; gap:6px; }
.act-btn { background:none; border:none; cursor:pointer; color:var(--text2); font-size:1.5rem; padding:6px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; transition: color 0.2s, transform 0.15s; }
.act-btn:hover { color:var(--text); transform:scale(1.1); }
.act-btn:active { transform:scale(0.9); }
.act-btn.liked { color:var(--red); }
.act-btn.saved { color:var(--pink); }
@keyframes likePop { 0%{transform:scale(1)} 25%{transform:scale(1.4)} 60%{transform:scale(0.9)} 100%{transform:scale(1)} }
.like-pop { animation: likePop 0.4s cubic-bezier(0.34,1.56,0.64,1); }

.likes-row { padding:2px 14px 6px; font-size:0.85rem; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; transition:color 0.2s; }
.likes-row:hover { color:var(--pink2); }
.post-caption { padding:2px 14px 8px; font-size:0.85rem; line-height:1.55; }
.post-caption .uname { font-weight:700; margin-right:6px; }
.post-caption .hashtag { color:var(--blue); }
.post-comments-link { padding:0 14px 4px; font-size:0.83rem; color:var(--text3); cursor:pointer; transition:color 0.2s; }
.post-comments-link:hover { color:var(--text); }
.post-time { padding:0 14px 14px; font-size:0.72rem; color:var(--text3); text-transform:uppercase; letter-spacing:0.05em; }

/* ── COMMENT BAR ── */
.comment-bar { display:flex; align-items:center; gap:10px; padding:10px 14px; border-top:1px solid var(--border); }
.cb-avatar { width:30px; height:30px; border-radius:50%; background:var(--surface3); overflow:hidden; flex-shrink:0; }
.cb-avatar img { width:100%; height:100%; object-fit:cover; }
.cb-input { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:7px 14px; color:var(--text); font-size:0.83rem; font-family:inherit; outline:none; transition:border-color 0.2s; }
.cb-input:focus { border-color:rgba(225,48,108,0.4); }
.cb-input::placeholder { color:var(--text3); }
.cb-send { background:none; border:none; cursor:pointer; color:var(--pink2); font-size:0.82rem; font-weight:700; opacity:0; transform:translateX(6px); transition:opacity 0.2s, transform 0.2s; white-space:nowrap; }
.cb-send.show { opacity:1; transform:translateX(0); }

/* ── SKELETONS ── */
.skeleton-card { background:var(--surface); margin-bottom:2px; }
@media(min-width:768px) { .skeleton-card { border-radius:var(--r); margin-bottom:16px; } }
.sk-header { display:flex; align-items:center; gap:10px; padding:14px; }
.sk { background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%); background-size:300%; animation:shimmer 1.8s ease infinite; border-radius:6px; }
.sk-circle { width:42px; height:42px; border-radius:50%; flex-shrink:0; }
.sk-lines { flex:1; display:flex; flex-direction:column; gap:8px; }
.sk-line { height:9px; }
.sk-img { width:100%; aspect-ratio:1; }
.sk-footer { padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
@keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }

/* ── SIDEBAR ── */
.sidebar { display:none; }
@media(min-width:768px) { .sidebar { display:flex; flex-direction:column; gap:20px; } }

/* ── BOTTOM NAV ── */

/* ── TOAST ── */

@keyframes toastIn { from{opacity:0;transform:translateY(12px) scale(0.9)} to{opacity:1;transform:translateY(0) scale(1)} }

async function init() {
  await loadCurrentUser();
  await loadPosts();
  buildSidebar();
  setupDrag();
  renderNotifs();
  setTimeout(() => {
    document.getElementById('badge').classList.add('show');
  }, 1200);
}

async function loadCurrentUser() {
  try {
    const r = await fetch('/auth/me');
    if (r.ok) {
      currentUser = await r.json();
      updateProfileDropdown();
    }
  } catch(e) {}
}

function updateProfileDropdown() {
  if (!currentUser) return;
  const avEl = document.getElementById('pdAvatar');
  if (currentUser.avatar) avEl.innerHTML = `<img src="${currentUser.avatar}" onerror="this.parentElement.textContent='🧑'"/>`;
  document.getElementById('pdName').textContent = currentUser.fullname || currentUser.username || 'You';
  document.getElementById('pdHandle').textContent = '@' + (currentUser.username || '—');
  document.getElementById('pdFollowers').textContent = formatCount(currentUser.followers?.length || 0);
  document.getElementById('pdFollowing').textContent = formatCount(currentUser.following?.length || 0);
}

function formatCount(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n;
}

// ── PROFILE DROPDOWN ──
function toggleProfileMenu() {
  profileMenuOpen = !profileMenuOpen;
  document.getElementById('profileDropdown').classList.toggle('open', profileMenuOpen);
  if (profileMenuOpen) {
    notifPanelOpen = false;
    document.getElementById('notifPanel').classList.remove('open');
    document.getElementById('panelBackdrop').classList.add('open');
  } else {
    document.getElementById('panelBackdrop').classList.remove('open');
  }
}
function closeProfileMenu() {
  profileMenuOpen = false;
  document.getElementById('profileDropdown').classList.remove('open');
  document.getElementById('panelBackdrop').classList.remove('open');
}

async function logout() {
  closeProfileMenu();
  try {
    await fetch('/auth/logout', { method: 'POST' });
  } catch(e) {}
  toast('👋 Logged out successfully');
  setTimeout(() => { window.location = '/login'; }, 800);
}

// ── NOTIFICATIONS ──
function toggleNotifs() {
  notifPanelOpen = !notifPanelOpen;
  document.getElementById('notifPanel').classList.toggle('open', notifPanelOpen);
  if (notifPanelOpen) {
    closeProfileMenu();
    document.getElementById('panelBackdrop').classList.add('open');
    document.getElementById('badge').classList.remove('show');
  } else {
    document.getElementById('panelBackdrop').classList.remove('open');
  }
}

function closeAllPanels() {
  notifPanelOpen = false; profileMenuOpen = false;
  document.getElementById('notifPanel').classList.remove('open');
  document.getElementById('profileDropdown').classList.remove('open');
  document.getElementById('panelBackdrop').classList.remove('open');
}

function switchNotifTab(tab, btn) {
  currentNotifTab = tab;
  document.querySelectorAll('.notif-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderNotifs();
}

function renderNotifs() {
  const list = document.getElementById('notifList');
  let items = NOTIFS;
  if (currentNotifTab === 'likes') items = NOTIFS.filter(n => n.type === 'like');
  else if (currentNotifTab === 'follows') items = NOTIFS.filter(n => n.type === 'follow');
  else if (currentNotifTab === 'comments') items = NOTIFS.filter(n => n.type === 'comment');

  if (!items.length) {
    list.innerHTML = `<div class="notif-empty"><div class="notif-empty-icon">🔔</div><p>No notifications here yet</p></div>`;
    return;
  }

  list.innerHTML = items.map((n, i) => `
    <div class="notif-item ${n.unread ? 'unread' : ''}" style="animation-delay:${i * 0.04}s">
      <div class="notif-av">${n.icon}</div>
      <div class="notif-content">
        <div class="notif-text"><strong>${esc(n.user)}</strong> ${esc(n.text)}</div>
        <div class="notif-time">${n.time}</div>
        ${n.hasFollow ? `<button class="notif-action-btn follow-back" onclick="this.textContent='Following ✓';this.className='notif-action-btn';toast('✅ Following ${esc(n.user)}!')">Follow back</button>` : ''}
      </div>
      ${n.hasThumb ? `<div class="notif-thumb" style="background:linear-gradient(135deg,hsl(${i*55},60%,25%),hsl(${i*55+80},50%,35%))"></div>` : ''}
      ${n.unread ? `<div class="notif-dot"></div>` : ''}
    </div>`).join('');
}

// ── STORIES ──
function buildStories(authors) {
  const row = document.getElementById('storiesRow');
  if (currentUser?.avatar) {
    document.getElementById('myAvatar').innerHTML = `<img src="${currentUser.avatar}" onerror="this.parentElement.textContent='🧑'"/>`;
  }
  const seen = new Set();
  authors.forEach((a, i) => {
    if (!a || seen.has(a._id)) return;
    seen.add(a._id);
    storyAuthors.push(a);
    const el = document.createElement('div');
    el.className = 'story-item';
    el.style.animationDelay = ((i + 1) * 0.06) + 's';
    el.innerHTML = `
      <div class="story-ring-wrap">
        <div class="story-ring">
          <div class="story-inner">
            ${a.avatar ? `<img src="${a.avatar}" onerror="this.parentElement.textContent='👤'"/>` : `<span>${(a.username||'?')[0].toUpperCase()}</span>`}
          </div>
        </div>
      </div>
      <span class="story-name">${esc(a.username)}</span>`;
    el.onclick = () => openStory(storyAuthors.indexOf(a));
    row.appendChild(el);
  });
}

function openStory(idx) { storyIndex = idx; document.getElementById('storyViewer').classList.add('open'); renderStory(); }
function renderStory() {
  const a = storyAuthors[storyIndex];
  if (!a) { closeStory(); return; }
  document.getElementById('storyViewerName').textContent = a.username || '';
  document.getElementById('storyViewerAv').innerHTML = a.avatar ? `<img src="${a.avatar}" style="width:100%;height:100%;object-fit:cover;"/>` : '';
  document.getElementById('storyImg').style.display = 'none';
  document.getElementById('storyViewer').querySelector('.story-viewer-content').style.background =
    `linear-gradient(135deg, hsl(${(storyIndex*60)%360},60%,15%), hsl(${(storyIndex*60+120)%360},50%,20%))`;
  const bars = document.getElementById('storyBars');
  bars.innerHTML = storyAuthors.map((_, i) =>
    `<div class="story-prog-bar"><div class="story-prog-fill ${i < storyIndex ? 'done' : ''}"></div></div>`).join('');
  clearTimeout(storyTimer);
  if (storyIndex < storyAuthors.length - 1) storyTimer = setTimeout(nextStory, 5000);
}
function nextStory() { storyIndex++; if (storyIndex >= storyAuthors.length) closeStory(); else renderStory(); }
function prevStory() { storyIndex = Math.max(0, storyIndex - 1); renderStory(); }
function closeStory() { clearTimeout(storyTimer); document.getElementById('storyViewer').classList.remove('open'); }

// ── POSTS ──
async function loadPosts() {
  try {
    const r = await fetch('/posts');
    if (r.ok) posts = await r.json();
    else if (r.status === 401) { window.location = '/login'; return; }
  } catch(e) {}
  const loader = document.getElementById('feedLoader');
  if (loader) loader.remove();
  renderPosts();
  buildStories(posts.map(p => p.author).filter(Boolean));
  // Update post count in dropdown
  document.getElementById('pdPosts').textContent = posts.length;
}

function renderPosts() {
  const feed = document.getElementById('postsFeed');
  feed.innerHTML = '';
  if (!posts.length) {
    feed.innerHTML = `<div class="empty-state"><div class="e-icon">🌟</div><h3>Nothing here yet</h3><p>Be the first to share something with your GM University community!</p></div>`;
    return;
  }
  posts.forEach((p, i) => feed.appendChild(makeCard(p, i)));
}

function makeCard(p, i) {
  const isOwn = currentUser && p.author?._id === currentUser._id;
  const card = document.createElement('div');
  card.className = 'post-card';
  card.id = 'post-' + p._id;
  card.style.animationDelay = (i * 0.07 + 0.05) + 's';
  const avHtml = p.author?.avatar
    ? `<img src="${p.author.avatar}" onerror="this.parentElement.textContent='👤'"/>`
    : `<span>${(p.author?.username||'?')[0].toUpperCase()}</span>`;
  const media = p.mediaType === 'video'
    ? `<video src="${p.mediaUrl}" controls playsinline preload="metadata" style="width:100%;height:100%;object-fit:cover"></video>`
    : `<img src="${p.mediaUrl}" loading="lazy" alt="post" onerror="this.style.background='var(--surface3)'"/>`;
  const caption = p.caption ? formatCaption(p.caption) : '';
  const lc = p.likesCount || 0;
  card.innerHTML = `
    <div class="post-header">
      <div class="post-avatar-wrap" onclick="goProfile()"><div class="post-avatar-inner">${avHtml}</div></div>
      <div class="post-meta">
        <div class="post-username" onclick="goProfile()">${esc(p.author?.username||'Unknown')}</div>
        ${p.location ? `<div class="post-location">📍 ${esc(p.location)}</div>` : ''}
      </div>
      ${isOwn ? `<button class="post-menu" onclick="openSheet('${p._id}')"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>` : ''}
    </div>
    <div class="post-media" ondblclick="dtLike(this,'${p._id}')">
      ${media}
      <div class="dt-heart">❤️</div>
    </div>
    <div class="post-actions">
      <div class="actions-left">
        <button class="act-btn ${p.liked?'liked':''}" id="lb-${p._id}" onclick="toggleLike('${p._id}')">
          ${p.liked
            ? `<svg viewBox="0 0 24 24" width="26" height="26"><path fill="#ff3b5c" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
            : `<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
          }
        </button>
        <button class="act-btn" onclick="focusComment('${p._id}')">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <button class="act-btn" onclick="sharePost('${p._id}')">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <button class="act-btn" id="sb-${p._id}" onclick="toggleSave(this,'${p._id}')">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="19 21 12 16 5 21 5 3 19 3 19 21"/></svg>
      </button>
    </div>
    <div class="likes-row" id="lc-${p._id}" onclick="showLikers('${p._id}')">
      ${lc > 0 ? `<strong>${lc.toLocaleString()} like${lc!==1?'s':''}</strong>` : `<span style="color:var(--text3);font-weight:400">Be the first to like</span>`}
    </div>
    ${caption ? `<div class="post-caption"><span class="uname">${esc(p.author?.username||'')}</span>${caption}</div>` : ''}
    ${p.commentsCount > 0 ? `<div class="post-comments-link" onclick="focusComment('${p._id}')">View all ${p.commentsCount} comments</div>` : ''}
    <div class="post-time">${formatTime(p.createdAt)}</div>
    <div class="comment-bar">
      <div class="cb-avatar">${currentUser?.avatar?`<img src="${currentUser.avatar}" onerror="this.remove()"/>`:'🧑'}</div>
      <input class="cb-input" id="ci-${p._id}" placeholder="Add a comment…" oninput="cbInput(this,'${p._id}')"/>
      <button class="cb-send" id="cs-${p._id}" onclick="postComment('${p._id}')">Post</button>
    </div>`;
  return card;
}

// ── LIKE ──
async function toggleLike(id) {
  const btn = document.getElementById('lb-' + id);
  const wasLiked = btn.classList.contains('liked');
  const post = posts.find(p => p._id === id);
  btn.classList.toggle('liked', !wasLiked);
  btn.classList.add('like-pop');
  btn.addEventListener('animationend', () => btn.classList.remove('like-pop'), {once:true});
  btn.innerHTML = !wasLiked
    ? `<svg viewBox="0 0 24 24" width="26" height="26"><path fill="#ff3b5c" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`
    : `<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
  if (post) { post.liked = !wasLiked; post.likesCount = (post.likesCount||0) + (!wasLiked ? 1 : -1); updateLc(id, post.likesCount); }
  try {
    const r = await fetch(`/posts/${id}/like`, {method:'POST'});
    if (r.ok) { const d = await r.json(); if(post){post.likesCount=d.likesCount;post.liked=d.liked;} updateLc(id,d.likesCount); }
  } catch(e) {}
}
function updateLc(id, count) {
  const el = document.getElementById('lc-' + id);
  if (!el) return;
  el.innerHTML = count > 0
    ? `<strong>${count.toLocaleString()} like${count!==1?'s':''}</strong>`
    : `<span style="color:var(--text3);font-weight:400">Be the first to like</span>`;
}
function dtLike(mediaEl, id) {
  const h = mediaEl.querySelector('.dt-heart');
  h.classList.remove('burst'); void h.offsetWidth; h.classList.add('burst');
  const btn = document.getElementById('lb-' + id);
  if (!btn.classList.contains('liked')) toggleLike(id);
}

async function showLikers(id) {
  const post = posts.find(p => p._id === id);
  if (!post || !post.likesCount) { toast('No likes yet'); return; }
  document.getElementById('likesBody').innerHTML = '<div style="padding:24px;text-align:center;color:var(--text3)">Loading…</div>';
  document.getElementById('likesOverlay').classList.add('open');
  try {
    const r = await fetch(`/posts/${id}/likers`);
    const likers = r.ok ? await r.json() : [];
    document.getElementById('likesBody').innerHTML = likers.length
      ? likers.map(u=>`<div class="liker-row"><div class="liker-av">${u.avatar?`<img src="${u.avatar}"/>`:'👤'}</div><div><div class="liker-name">${esc(u.username)}</div><div class="liker-handle">@${esc(u.username)}</div></div><button class="liker-follow">Follow</button></div>`).join('')
      : `<div style="padding:24px;text-align:center;color:var(--text3)">${post.likesCount} people liked this</div>`;
  } catch(e) {
    document.getElementById('likesBody').innerHTML = `<div style="padding:24px;text-align:center;color:var(--text3)">${post.likesCount} likes</div>`;
  }
}
function closeLikes() { document.getElementById('likesOverlay').classList.remove('open'); }
document.getElementById('likesOverlay').onclick = e => { if(e.target===document.getElementById('likesOverlay')) closeLikes(); };

// ── SHEET ──
function openSheet(id) { deletePostId = id; document.getElementById('sheetOverlay').classList.add('open'); document.getElementById('optSheet').classList.add('open'); }
function closeSheet() { document.getElementById('sheetOverlay').classList.remove('open'); document.getElementById('optSheet').classList.remove('open'); }
async function deletePost() {
  closeSheet();
  if (!deletePostId) return;
  try {
    const r = await fetch(`/posts/${deletePostId}`, {method:'DELETE'});
    if (r.ok) {
      posts = posts.filter(p=>p._id!==deletePostId);
      const card = document.getElementById('post-'+deletePostId);
      if (card) { card.style.transition='all 0.3s'; card.style.opacity='0'; card.style.transform='scale(0.95)'; setTimeout(()=>card.remove(),300); }
      toast('🗑️ Post deleted');
    }
  } catch(e) { toast('❌ Failed to delete'); }
}
function copyLink() { navigator.clipboard?.writeText(location.origin+'/post/'+deletePostId); closeSheet(); toast('🔗 Link copied!'); }

// ── UPLOAD ──
function openUpload() { closeAllPanels(); document.getElementById('uploadOverlay').classList.add('open'); }
function closeUpload() {
  document.getElementById('uploadOverlay').classList.remove('open');
  document.getElementById('dropzone').style.display='';
  const prev=document.getElementById('uploadPreview'); prev.style.display='none'; prev.innerHTML='';
  document.getElementById('captionIn').value='';
  document.getElementById('locationIn').value='';
  selectedFile=null;
}
function fileSelected(e) {
  const f = e.target.files[0]; if(!f) return;
  selectedFile = f;
  const url = URL.createObjectURL(f);
  document.getElementById('dropzone').style.display='none';
  const prev = document.getElementById('uploadPreview');
  prev.style.display='block';
  prev.innerHTML = f.type.startsWith('video')
    ? `<video src="${url}" controls style="width:100%;max-height:260px;object-fit:contain"></video>`
    : `<img src="${url}" style="width:100%;max-height:260px;object-fit:contain"/>`;
}
function setupDrag() {
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('active-drag');});
  dz.addEventListener('dragleave', ()=>dz.classList.remove('active-drag'));
  dz.addEventListener('drop', e=>{e.preventDefault();dz.classList.remove('active-drag');const f=e.dataTransfer.files[0];if(f){document.getElementById('fileIn').files=e.dataTransfer.files;fileSelected({target:{files:[f]}});}});
}
async function submitPost() {
  if (!selectedFile) { toast('Please select a photo or video'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='Uploading…';
  const fd = new FormData();
  fd.append('media', selectedFile);
  fd.append('caption', document.getElementById('captionIn').value);
  fd.append('location', document.getElementById('locationIn').value);
  try {
    const r = await fetch('/posts', {method:'POST',body:fd});
    if (r.ok) { const p = await r.json(); posts.unshift(p); closeUpload(); renderPosts(); scrollTop(); toast('🎉 Post shared!'); }
    else { const e=await r.json(); toast('❌ '+(e.message||'Upload failed')); }
  } catch(e) { toast('❌ Upload failed'); }
  btn.disabled=false; btn.textContent='Share Post';
}

// ── COMMENTS ──
function focusComment(id) { document.getElementById('ci-'+id)?.focus(); }
function cbInput(el, id) { document.getElementById('cs-'+id)?.classList.toggle('show', el.value.trim().length>0); }
async function postComment(id) {
  const inp = document.getElementById('ci-'+id); if(!inp) return;
  const text = inp.value.trim(); if(!text) return;
  try { await fetch('/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({postId:id,text})}); } catch(e){}
  inp.value=''; document.getElementById('cs-'+id)?.classList.remove('show');
  toast('💬 Comment posted');
}

function toggleSave(btn, id) {
  btn.classList.toggle('saved');
  const saved = btn.classList.contains('saved');
  btn.querySelector('svg').style.fill = saved ? 'var(--pink)' : 'none';
  toast(saved ? '🔖 Saved to collection' : 'Removed from saved');
}
function sharePost(id) {
  if (navigator.share) { navigator.share({title:'GMinsta Post', url:location.origin+'/post/'+id}); }
  else { navigator.clipboard?.writeText(location.origin+'/post/'+id); toast('🔗 Link copied!'); }
}

// ── SIDEBAR ──
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  const name = currentUser?.username || 'You';
  const avHtml = currentUser?.avatar ? `<img src="${currentUser.avatar}" onerror="this.parentElement.textContent='🧑'"/>` : '🧑';
  const followers = currentUser?.followers?.length || 0;
  const following = currentUser?.following?.length || 0;
  sb.innerHTML = `
    <div class="side-profile">
      <div class="side-profile-top">
        <div class="side-av"><div class="side-av-inner">${avHtml}</div></div>
        <div><div class="side-name">${esc(name)}</div><div class="side-handle">@${esc(name)}</div></div>
        <button class="side-switch" onclick="logout()">Log out</button>
      </div>
      <div class="side-stats">
        <div class="side-stat" onclick="goProfile()"><div class="side-stat-num">${posts.length}</div><div class="side-stat-label">Posts</div></div>
        <div class="side-stat" onclick="goProfile()"><div class="side-stat-num">${formatCount(followers)}</div><div class="side-stat-label">Followers</div></div>
        <div class="side-stat" onclick="goProfile()"><div class="side-stat-num">${formatCount(following)}</div><div class="side-stat-label">Following</div></div>
      </div>
    </div>
    <div class="side-section">
      <div class="side-section-title">Suggested for you</div>
      <div id="suggs">${buildSuggestions()}</div>
    </div>
    <div class="side-section">
      <div class="side-footer">About · Help · Privacy · Terms<br/>&copy; ${new Date().getFullYear()} GMinsta · GM University</div>
    </div>`;
}
function buildSuggestions() {
  const seen = new Set();
  const authors = posts.map(p=>p.author).filter(a=>a&&!seen.has(a._id)&&seen.add(a._id)).slice(0,5);
  if (!authors.length) return '<p style="color:var(--text3);font-size:0.82rem">No suggestions yet</p>';
  return authors.map((a,i) => `
    <div class="sugg-item" style="animation-delay:${i*0.07}s">
      <div class="sugg-av">${a.avatar?`<img src="${a.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.remove()"/>`:'👤'}</div>
      <div><div class="sugg-name">${esc(a.username||'')}</div><div class="sugg-sub">Suggested for you</div></div>
      <button class="sugg-follow" onclick="followUser(this,'${esc(a.username)}')">Follow</button>
    </div>`).join('');
}
function followUser(btn, username) {
  const isFollowing = btn.classList.contains('following');
  btn.classList.toggle('following', !isFollowing);
  btn.textContent = isFollowing ? 'Follow' : 'Following';
  if(!isFollowing) toast('✅ Following ' + username + '!');
}

// ── HELPERS ──
function formatCaption(text) { return esc(text).replace(/#(\w+)/g, '<span class="hashtag">#$1</span>'); }
function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatTime(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return 'Just now'; if (m < 60) return m + 'm ago';
  const h = Math.floor(m/60); if (h < 24) return h + 'h ago';
  const d = Math.floor(h/24); if (d < 7) return d + 'd ago';
  return new Date(ts).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function toast(msg) {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className='toast'; el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(),3200);
}
function scrollTop() { window.scrollTo({top:0,behavior:'smooth'}); }
function goProfile() { window.location='/profile'; }

document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeLikes(); closeUpload(); closeSheet(); closeStory(); closeAllPanels(); }
});

init();
</script>
</body>
